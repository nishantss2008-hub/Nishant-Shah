<style>
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font-sans); }
  .pt { position: fixed; inset: 0; z-index: 9999; pointer-events: none; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 0 clamp(32px, 8vw, 100px); }
  .topbar { padding: 28px clamp(32px, 8vw, 100px) 0; max-width: 1100px; margin: 0 auto; box-sizing: border-box; }
  .back { display: inline-flex; align-items: center; gap: 8px; color: var(--text-2); text-decoration: none; font-size: 0.9rem; font-family: var(--font-mono); letter-spacing: 0.02em; transition: color .2s; }
  .back:hover { color: var(--accent); }
  .sp-hero { display: grid; grid-template-columns: 1.1fr 1fr; gap: clamp(28px, 5vw, 64px); align-items: center; padding: clamp(40px, 7vw, 90px) clamp(32px, 8vw, 100px) clamp(30px, 5vw, 56px); max-width: 1100px; margin: 0 auto; box-sizing: border-box; }

  .sp-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .sp-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; padding: 0 0 clamp(40px, 6vw, 70px); border-bottom: 1px solid var(--border); }
  @media (max-width: 720px) { .sp-metrics { grid-template-columns: repeat(2, 1fr); } }
  .sp-metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: 22px 20px; }
  .sp-metric .v { font-size: clamp(1.6rem, 3vw, 2.3rem); font-weight: 700; letter-spacing: -0.03em; line-height: 1; }
  .sp-metric .k { margin-top: 9px; font-size: 0.85rem; color: var(--text-3); line-height: 1.4; }
  .sp-grid-h { font-family: var(--font-mono); font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); margin: clamp(40px,6vw,64px) 0 22px; }

  .scard:hover { transform: translateY(-5px); box-shadow: var(--shadow-3); border-color: var(--text-3); }

  .scard:hover .ph { transform: scale(1.05); }
  .scard.has-img::after { content: ""; position: absolute; inset: 0; background: linear-gradient(transparent 30%, rgba(0,0,0,0.9)); }

  .scard .sub { margin: 3px 0 0; font-size: 0.8rem; color: var(--text-3); }

  .scard.has-img .sub { color: rgba(255,255,255,0.72); }
  .scard.has-img .go { color: rgba(255,255,255,0.8); }
  footer { border-top: 1px solid var(--border); padding: 36px 0; color: var(--text-3); font-size: 0.85rem; }
  /* theatre curtain (T page only) */
  .curtain { position: fixed; inset: 0; z-index: 10000; pointer-events: none; display: none; }
  .curtain.show { display: block; }
  .curtain-panel { position: absolute; top: -4%; bottom: 0; width: 54%; background:
      repeating-linear-gradient(90deg, #2a1145 0px, #3c1a63 26px, #4a2178 52px, #341553 78px, #2a1145 104px);
      box-shadow: inset -30px 0 60px rgba(0,0,0,0.55), 0 0 80px rgba(0,0,0,0.5);
      border-radius: 0 0 60% 40% / 0 0 14% 10%;
      transition: transform 2.3s cubic-bezier(.65,0,.25,1); }
  /* scalloped, draped bottom edge */
  .curtain-panel { -webkit-mask: radial-gradient(28px 22px at 28px 100%, transparent 96%, #000 100%) repeat-x bottom left / 56px 100%; mask: radial-gradient(28px 22px at 28px 100%, transparent 96%, #000 100%) repeat-x bottom left / 56px 100%; }
  .curtain-panel::after { content: ""; position: absolute; top: 0; bottom: 0; width: 36px; background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent); }
  .curtain-panel.left { left: 0; transform: translateX(0); border-right: 3px solid rgba(0,0,0,0.4); }
  .curtain-panel.right { right: 0; transform: translateX(0); border-left: 3px solid rgba(0,0,0,0.4); }
  .curtain-panel.right::after { right: 0; background: linear-gradient(270deg, rgba(255,255,255,0.08), transparent); }
  .curtain.open .curtain-panel.left { transform: translateX(-102%); }
  .curtain.open .curtain-panel.right { transform: translateX(102%); }
  @media (prefers-reduced-motion: reduce) { .curtain { display: none !important; } }
  /* enterprise build intro (E page only) — dark, gears + hammer + rising tower */
  .build-intro { position: fixed; inset: 0; z-index: 10000; display: none; overflow: hidden; background: radial-gradient(130% 110% at 50% 36%, #15233b 0%, #0a1018 70%, #05080d 100%); }
  .build-intro.show { display: flex; align-items: center; justify-content: center; }
  .build-intro svg { width: min(78vw, 560px); height: auto; }
  .build-intro .tower { transform: translateY(60px); opacity: 0; animation: towerIn 1.1s cubic-bezier(.3,.9,.3,1) .15s forwards; }
  @keyframes towerIn { to { transform: translateY(0); opacity: 1; } }
  .build-intro .gearA { transform-box: fill-box; transform-origin: center; animation: spin 4s linear infinite; }
  .build-intro .gearB { transform-box: fill-box; transform-origin: center; animation: spinR 3s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes spinR { to { transform: rotate(-360deg); } }
  .build-intro .hammer { transform-box: fill-box; transform-origin: 50% 96%; animation: hammer 1.1s cubic-bezier(.5,0,.3,1) infinite; }
  @keyframes hammer { 0%,100%{ transform: rotate(-32deg);} 45%{ transform: rotate(8deg);} 60%{ transform: rotate(2deg);} }
  .build-intro .spark { opacity: 0; animation: spark 1.1s linear infinite; }

  .build-intro.done { opacity: 0; transition: opacity .6s ease; pointer-events: none; }
  @media (prefers-reduced-motion: reduce) { .build-intro { display: none !important; } }
  /* advocacy intro (A) — EKG + heart */
  .care-intro { position: fixed; inset: 0; z-index: 10000; display: none; align-items: center; justify-content: center; background: radial-gradient(130% 110% at 50% 40%, #122a20 0%, #0a140f 70%, #05080d 100%); }

  .team-intro .ring { fill: none; stroke: #f5b21a; stroke-width: 3; stroke-dasharray: 4 10; opacity: 0; transform-box: fill-box; transform-origin: center; animation: ringIn .7s ease 1s forwards, ringSpin 14s linear 1s infinite; }

  @media (prefers-reduced-motion: reduce) { .care-intro, .team-intro { display: none !important; } }

  if (s === 'M') {
    var ti = document.getElementById('teamIntro');
    if (ti) { ti.classList.add('show'); setTimeout(function(){ ti.classList.add('done'); }, 2700); setTimeout(function(){ ti.classList.remove('show'); }, 3400); }
  }
  var d = SPIKES[s] || SPIKES.T;
  document.documentElement.style.setProperty('--accent', d.color);
  document.getElementById('sp-letter').textContent = s;
  document.getElementById('sp-letter').style.color = d.color;
  document.getElementById('sp-title').textContent = d.title;
  document.getElementById('sp-blurb').textContent = d.blurb;
  var hi = document.getElementById('sp-img'); hi.src = d.img; hi.alt = d.title;
  document.title = d.title + ' · Nishant Shah';
  document.getElementById('sp-metrics').innerHTML = d.metrics.map(function(m){
    return '<div class="sp-metric"><div class="v" style="color:'+d.color+'">'+m[0]+'</div><div class="k">'+m[1]+'</div></div>';
  }).join('');
  document.getElementById('sp-grid').innerHTML = d.cards.map(function(c){
    var img = c.img ? '<div class="ph" style="background-image:url(\''+c.img+'\');'+(c.contain?'background-size:contain;background-repeat:no-repeat;background-color:#fff;':('background-position:'+(c.pos||'center')+';'))+'"></div>' : '';
    var inner = img
      +'<div class="inner"><div class="num">'+c.n+'</div><div class="lab">'+c.lab+'</div>'
      +'<div class="foot"><div><h3>'+c.t+'</h3><p class="sub">'+c.sub+'</p></div>'+(c.p?'<span class="go">→</span>':'')+'</div></div>';
    if (c.p) return '<a class="scard'+(c.img?' has-img':'')+'" href="case-study.html?p='+c.p+'">'+inner+'</a>';
    return '<div class="scard'+(c.img?' has-img':'')+'" style="cursor:default;">'+inner+'</div>';
  }).join('');
  if (d.more && d.more.length) {
    document.getElementById('sp-more').innerHTML =
      '<div class="sp-grid-h">More leadership</div><ul class="sp-more-list">' +
      d.more.map(function(m){ return '<li>'+m+'</li>'; }).join('') + '</ul>';
  }
  var yrEl = document.getElementById('yr'); if (yrEl) yrEl.textContent = new Date().getFullYear();
})();
</script>
<script src="assets/transition.js"></script>
</body>
