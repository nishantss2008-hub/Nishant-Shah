<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eco-Vision — Case Study · Nishant Shah</title>
<link rel="stylesheet" href="assets/tokens.css" />
<style>
  /* ---------- Top bar ---------- */
  .cs-top {
    position: sticky; top: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between;
    padding: 14px 26px; background: color-mix(in srgb, var(--bg) 80%, transparent);
    backdrop-filter: saturate(140%) blur(14px); border-bottom: 1px solid var(--border);
  }
  .back { display: inline-flex; align-items: center; gap: 9px; color: var(--text-2); font-weight: 500; font-size: 0.95rem; transition: color var(--dur-1), gap var(--dur-1); }
  .back:hover { color: var(--text); gap: 12px; }
  .back svg { width: 18px; height: 18px; }
  .theme-toggle { display: inline-flex; align-items: center; gap: 4px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--r-pill); padding: 5px; cursor: pointer; }
  .theme-toggle .knob { width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center; color: var(--text-3); transition: background var(--dur-1), color var(--dur-1); }
  .theme-toggle .knob.active { background: var(--accent); color: #fff; }
  .theme-toggle svg { width: 15px; height: 15px; }

  .cwrap { max-width: 820px; margin: 0 auto; padding: 0 26px; }

  /* ---------- Hero ---------- */
  .cs-hero { padding: clamp(48px, 8vw, 96px) 0 0; }
  .tagrow { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
  .cs-hero h1 { font-size: clamp(2.4rem, 6vw, 4.4rem); line-height: 0.98; letter-spacing: -0.04em; }
  .cs-hero .sub { margin-top: 22px; font-size: clamp(1.15rem, 2vw, 1.45rem); color: var(--text-2); line-height: 1.5; max-width: 60ch; }

  .factbar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; margin-top: 46px; }
  .factbar > div { background: var(--bg); padding: 20px; }
  .factbar .k { font-family: var(--font-mono); font-size: 0.64rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); }
  .factbar .v { font-size: 1.05rem; font-weight: 600; margin-top: 8px; }
  @media (max-width: 680px) { .factbar { grid-template-columns: 1fr 1fr; } }

  .hero-art { margin-top: 40px; aspect-ratio: 16/8; border-radius: var(--r-lg); border: 1px solid var(--border); background: linear-gradient(160deg, var(--surface-2), var(--surface-3)); display: grid; place-items: center; overflow: hidden; }
  .hero-art svg { width: 46%; }

  /* ---------- Body sections ---------- */
  .cs-sec { padding: clamp(48px, 7vw, 88px) 0; border-bottom: 1px solid var(--border); }
  .cs-sec .label { font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); margin-bottom: 18px; }
  .cs-sec h2 { font-size: clamp(1.7rem, 3.4vw, 2.6rem); margin-bottom: 22px; line-height: 1.05; }
  .cs-sec p { font-size: 1.12rem; color: var(--text-2); line-height: 1.7; margin-bottom: 18px; max-width: 64ch; }
  .cs-sec p strong { color: var(--text); font-weight: 600; }
  .pull { font-family: var(--font-serif); font-style: italic; font-size: clamp(1.6rem, 3.4vw, 2.4rem); color: var(--text); line-height: 1.3; margin: 10px 0; padding-left: 24px; border-left: 3px solid var(--accent); }

  .checklist { list-style: none; padding: 0; margin: 26px 0 0; display: grid; gap: 16px; }
  .checklist li { display: flex; gap: 14px; align-items: flex-start; font-size: 1.05rem; color: var(--text); line-height: 1.45; }
  .checklist li span.c { flex: 0 0 24px; width: 24px; height: 24px; border-radius: 50%; display: grid; place-items: center; background: var(--green-soft); color: var(--green); margin-top: 2px; }
  .checklist li span.c svg { width: 14px; height: 14px; }
  .checklist li b { font-weight: 600; }

  .imgrow { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 30px; }
  .cs-gallery { columns: 2; column-gap: 14px; margin-top: 6px; }
  @media (min-width: 680px) { .cs-gallery { columns: 3; } }
  .gItem { display: block; break-inside: avoid; margin-bottom: 14px; border-radius: var(--r-md); overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow-1); }
  .gItem img { width: 100%; display: block; transition: transform var(--dur-3) var(--ease); }
  .gItem:hover img { transform: scale(1.05); }
  /* photo carousel (capture case) */
  .pcar-intro { max-width: 820px; margin: 0 auto; padding: clamp(40px,7vw,84px) 26px 22px; }
  .pcar-intro .ctag { font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); }
  .pcar-intro h1 { font-size: clamp(2.4rem,6vw,4.4rem); letter-spacing: -0.04em; line-height: 0.98; margin: 12px 0 0; }
  .pcar-intro p { font-size: clamp(1.1rem,2vw,1.4rem); color: var(--text-2); margin-top: 18px; max-width: 60ch; line-height: 1.5; }
  .pcar-intro .pcar-hint { font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3); margin-top: 24px; }
  .pcar { display: flex; gap: 0; overflow-x: auto; scroll-snap-type: x proximity; padding: 3vh 42vw; align-items: center; min-height: 88vh; perspective: 1600px; -webkit-overflow-scrolling: touch; }
  .pslide { position: relative; flex: 0 0 auto; height: 78vh; margin: 0 -3vw; scroll-snap-align: center; border-radius: var(--r-lg); overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow-3); transition: opacity .25s var(--ease); transform-style: preserve-3d; }
  .pphoto { width: auto; background: #0a0a0a; }
  .pphoto img { width: auto; height: 100%; max-width: 80vw; object-fit: contain; display: block; }
  .ptext { width: min(78vw, 440px); display: grid; place-items: center; background: var(--surface); padding: 44px; }
  .ptext .ctag { font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); }
  .ptext h1 { font-size: clamp(2rem,5vw,3.2rem); letter-spacing: -0.04em; line-height: 1; margin: 12px 0 0; }
  .ptext h2 { font-size: clamp(1.5rem,3.4vw,2.1rem); letter-spacing: -0.03em; line-height: 1.05; margin: 8px 0 0; }
  .ptext p { color: var(--text-2); line-height: 1.6; margin-top: 14px; font-size: 1rem; }
  .ptext ul { margin: 12px 0 0; padding-left: 18px; color: var(--text-2); line-height: 1.5; font-size: 0.95rem; }
  .pcap { position: absolute; left: 0; right: 0; bottom: 0; margin: 0; padding: 44px 22px 20px; font-size: 1.02rem; color: #fff; background: linear-gradient(transparent, rgba(0,0,0,0.78)); text-shadow: 0 1px 10px rgba(0,0,0,0.6); }
  .pcard { position: absolute; left: 0; right: 0; bottom: 0; margin: 0; padding: 64px 26px 24px; color: #fff; background: linear-gradient(transparent, rgba(0,0,0,0.55) 45%, rgba(0,0,0,0.88)); text-shadow: 0 2px 16px rgba(0,0,0,0.9); }
  .pcard .ctag { font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.85; }
  .pcard h3 { font-size: clamp(1.4rem,3vw,2rem); letter-spacing: -0.02em; line-height: 1.05; margin: 8px 0 0; }
  .pcard p { font-size: 0.95rem; line-height: 1.5; margin-top: 8px; opacity: 0.94; max-width: 46ch; }
  .pcar::-webkit-scrollbar { height: 8px; }
  .pcar::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
  @media (max-width: 600px) { .imgrow { grid-template-columns: 1fr; } }
  .ph { aspect-ratio: 4/3; border-radius: var(--r-md); border: 1px solid var(--border); background: repeating-linear-gradient(135deg, var(--surface-2) 0 11px, var(--surface) 11px 22px); display: grid; place-items: center; }
  .ph span { font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-3); background: var(--bg); padding: 5px 11px; border-radius: var(--r-pill); border: 1px solid var(--border); }

  /* next */
  .nextcard { display: flex; align-items: center; justify-content: space-between; gap: 20px; padding: 34px; margin: 56px 0; text-decoration: none; color: inherit; flex-wrap: wrap; }
  .nextcard .k { font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3); }
  .nextcard h3 { font-size: 1.7rem; margin-top: 8px; }
  .nextcard .arrow { font-size: 1.6rem; color: var(--accent); transition: transform var(--dur-2) var(--ease); }
  .nextcard:hover .arrow { transform: translateX(6px); }

  footer { padding: 40px 0 70px; }
  .foot { display: flex; justify-content: space-between; gap: 14px; flex-wrap: wrap; color: var(--text-3); font-size: 0.84rem; }
  .foot .mono { font-family: var(--font-mono); }

  /* batch-C-css */
  .cs-bread { display:flex; gap:8px; align-items:center; font-family:var(--font-mono); font-size:.74rem; color:var(--text-3); margin-bottom:18px; flex-wrap:wrap; }
  .cs-bread a { color:var(--text-3); text-decoration:none; }
  .cs-bread a:hover { color:var(--accent); }
  .cs-bread .cur { color:var(--text-2); }
  .cs-readtime { font-family:var(--font-mono); font-size:.76rem; color:var(--text-3); margin-top:14px; letter-spacing:.04em; }
  .failog { list-style:none; padding:0; margin:8px 0 0; }
  .failog li { padding:14px 0 14px 28px; border-top:1px solid var(--border); color:var(--text-2); position:relative; line-height:1.5; }
  .failog li:first-child { border-top:0; }
  .failog li::before { content:'\2715'; position:absolute; left:0; top:13px; color:var(--amber); font-size:.82rem; }
  .faq details { border-top:1px solid var(--border); }
  .faq details summary { cursor:pointer; padding:16px 0; font-size:1.08rem; font-weight:600; color:var(--text); list-style:none; display:flex; justify-content:space-between; align-items:center; gap:16px; }
  .faq details summary::-webkit-details-marker { display:none; }
  .faq details summary::after { content:'+'; color:var(--accent); font-size:1.4rem; line-height:1; }
  .faq details[open] summary::after { content:'\2212'; }
  .faq details p { color:var(--text-2); line-height:1.6; margin:0 0 18px; max-width:62ch; }
  .reflectcard { background:var(--surface-2); border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:10px; padding:24px 26px; }
  .reflectcard .rl { font-family:var(--font-mono); font-size:.7rem; text-transform:uppercase; letter-spacing:.12em; color:var(--accent); }
  .reflectcard p { margin:10px 0 0; font-size:1.15rem; line-height:1.55; color:var(--text); font-style:italic; }
  .readbar { position:fixed; top:0; left:0; height:3px; background:var(--accent); width:0; z-index:9999; }

  /* lightbox-css */
  .lightbox { position:fixed; inset:0; z-index:10001; background:rgba(0,0,0,0.93); -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px); display:none; align-items:center; justify-content:center; }
  .lightbox.show { display:flex; }
  .lb-img { max-width:90vw; max-height:88vh; border-radius:8px; box-shadow:0 30px 80px rgba(0,0,0,.6); }
  .lb-close,.lb-prev,.lb-next { position:absolute; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#fff; width:48px; height:48px; border-radius:50%; font-size:1.4rem; cursor:pointer; display:grid; place-items:center; }
  .lb-close { top:24px; right:24px; } .lb-prev { left:24px; top:50%; transform:translateY(-50%); } .lb-next { right:24px; top:50%; transform:translateY(-50%); }
  .lb-close:hover,.lb-prev:hover,.lb-next:hover { background:rgba(255,255,255,0.22); }

  /* process-strip #40 */
  .procstrip { display:flex; gap:14px; overflow-x:auto; padding-bottom:10px; scroll-snap-type:x proximity; }
  .procitem { flex:0 0 auto; width:210px; height:150px; border-radius:10px; border:1px solid var(--border); background:repeating-linear-gradient(45deg,var(--surface-2),var(--surface-2) 11px,var(--surface-3) 11px,var(--surface-3) 22px); display:grid; place-items:end start; padding:14px; scroll-snap-align:start; }
  .procitem span { font-family:var(--font-mono); font-size:.76rem; color:var(--text-2); background:var(--surface); padding:4px 9px; border-radius:6px; }

  /* triad — how it drew on all three */
  .triad{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  @media(max-width:640px){.triad{grid-template-columns:1fr;}}
  .tri-card{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--border);border-radius:var(--r-lg);padding:20px 22px;}
  .tri-card.tri-b{border-top-color:var(--accent);}.tri-card.tri-m{border-top-color:var(--amber);}.tri-card.tri-g{border-top-color:var(--green);}
  .tri-h{font-family:var(--font-mono);font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:10px;}
  .tri-b .tri-h{color:var(--accent);}.tri-m .tri-h{color:var(--amber);}.tri-g .tri-h{color:var(--green);}
  .tri-card p{margin:0;color:var(--text-2);font-size:0.95rem;line-height:1.5;}
</style>
</head>
<body>
<div class="pt" id="pt"><div class="pt-mark">NS</div></div>
<script src="assets/transition.js"></script>

<header class="cs-top">
  <a class="back" href="Portfolio Journey.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back to work</a>
  <div class="theme-toggle" onclick="window.__toggleTheme()">
    <span class="knob" data-theme-knob="dark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></span>
    <span class="knob" data-theme-knob="light"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></svg></span>
  </div>
</header>

<main>
  <div class="cwrap cs-hero">
    <div class="tagrow reveal" id="cs-tagrow"></div>
    <h1 class="reveal" id="cs-title" style="transition-delay:.05s"></h1>
    <p class="sub reveal" id="cs-sub" style="transition-delay:.1s"></p>
    <div class="factbar reveal" id="cs-factbar" style="transition-delay:.16s"></div>
    <div class="hero-art reveal" id="cs-heroart" style="transition-delay:.2s"></div>
  </div>

  <div class="cwrap" id="cs-sections"></div>

  <div class="cwrap">
    <a class="card card-hover nextcard reveal" id="cs-next" href="#" style="display:none"></a>
  </div>

  <footer>
    <div class="cwrap foot">
    </div>
  </footer>
</main>

<script src="assets/cases.js"></script>
<script src="assets/portfolio.js"></script>
<script src="assets/enhance.js"></script>
</body>
</html>
