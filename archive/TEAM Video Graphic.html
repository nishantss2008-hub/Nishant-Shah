<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TEAM — Video Graphic</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }

  /* ---------- 1920x1080 stage, anchored dead-center ---------- */
  #frame { position: fixed; inset: 0; }
  #stage { position: absolute; left: 50%; top: 50%; width: 1920px; height: 1080px; overflow: hidden; background: #ffffff; transform: translate(-50%, -50%) scale(1); transform-origin: center; }
  #stage.bg-white { background: #ffffff; }
  #stage.bg-black { background: #0a0a0c; }
  #stage.bg-green { background: #00ff00; }
  #stage.bg-dawn { background: linear-gradient(165deg, #0a1430 0%, #1a2547 38%, #4a3a52 72%, #8a5a3a 100%); }
  #stage { --ink: #101014; }
  #stage.bg-black, #stage.bg-dawn { --ink: #ffffff; }

  /* spike colors */
  .cT { color: #8b5cf6; } .cE { color: #2563eb; } .cA { color: #16a34a; } .cM { color: #f59e0b; }

  /* ---------- per-letter scenes ---------- */
  .scene { position: absolute; inset: 0; display: grid; place-items: center; pointer-events: none; }
  .scene .inner { position: relative; text-align: center; transform: translateY(-14px); }
  /* masked letter rise */
  .scene .clip { display: block; overflow: hidden; line-height: 0.78; }
  .scene .ltr { display: block; font-size: 540px; font-weight: 800; letter-spacing: -0.05em; line-height: 0.78; transform: translateY(112%) rotate(5deg); transform-origin: left bottom; position: relative; }
  /* expanding baseline rule */
  .scene .rule { display: block; height: 10px; width: 360px; margin: 34px auto 0; border-radius: 5px; transform: scaleX(0); }
  .sT .rule { background: #8b5cf6; } .sE .rule { background: #2563eb; }
  .sA .rule { background: #16a34a; } .sM .rule { background: #f59e0b; }
  /* serif italic label, word by word */
  .scene .lname { display: block; margin-top: 30px; font-family: Georgia, "Times New Roman", serif; font-style: italic; font-size: 66px; color: var(--ink); letter-spacing: 0.005em; }
  .scene .lname span { display: inline-block; opacity: 0; transform: translateY(34px); }

  /* ---------- finale ---------- */
  #finale { position: absolute; inset: 0; display: grid; place-items: center; pointer-events: none; }
  #finale .inner { text-align: center; transform: translateY(-20px); }
  #finale .word { display: flex; gap: 10px; justify-content: center; }
  #finale .word span { font-size: 360px; font-weight: 800; letter-spacing: -0.04em; line-height: 0.78; opacity: 0; transform: translateY(140px) rotate(8deg) scale(0.7); }
  #finale .tag1 { margin-top: 54px; font-size: 58px; font-weight: 700; letter-spacing: -0.015em; color: var(--ink); opacity: 0; transform: translateY(28px); }
  #finale .tag2 { margin-top: 14px; font-family: Georgia, "Times New Roman", serif; font-style: italic; font-size: 52px; color: var(--ink); opacity: 0; transform: translateY(28px); max-width: 1480px; margin-left: auto; margin-right: auto; line-height: 1.3; }

  /* ---------- timeline (scene bases via --t) ---------- */
  .sT { --t: 0.30s; } .sE { --t: 2.40s; } .sA { --t: 4.50s; } .sM { --t: 6.60s; }
  .playing .scene { animation: sceneOut 0.45s cubic-bezier(.55,0,.55,.2) calc(var(--t) + 1.75s) forwards; }
  .playing .scene .ltr { animation: ltrRise 0.7s cubic-bezier(.16,1.1,.3,1) calc(var(--t) + 0.08s) both; }
  .playing .scene .rule { animation: ruleGrow 0.55s cubic-bezier(.2,.9,.2,1) calc(var(--t) + 0.42s) both; }
  .playing .scene .lname span:nth-child(1) { animation: wordUp 0.5s cubic-bezier(.2,.9,.25,1.2) calc(var(--t) + 0.52s) both; }
  .playing .scene .lname span:nth-child(2) { animation: wordUp 0.5s cubic-bezier(.2,.9,.25,1.2) calc(var(--t) + 0.62s) both; }
  .playing .scene .lname span:nth-child(3) { animation: wordUp 0.5s cubic-bezier(.2,.9,.25,1.2) calc(var(--t) + 0.72s) both; }
  .playing .scene .lname span:nth-child(4) { animation: wordUp 0.5s cubic-bezier(.2,.9,.25,1.2) calc(var(--t) + 0.82s) both; }

  @keyframes ltrRise { from { transform: translateY(112%) rotate(5deg); } to { transform: translateY(0) rotate(0); } }
  @keyframes ruleGrow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  @keyframes wordUp { from { opacity: 0; transform: translateY(34px); } to { opacity: 1; transform: none; } }
  @keyframes sceneOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-56px); } }

  .playing #finale .fT { animation: ltrSpring 0.7s cubic-bezier(.18,1.35,.3,1) 8.75s both; }
  .playing #finale .fE { animation: ltrSpring 0.7s cubic-bezier(.18,1.35,.3,1) 8.89s both; }
  .playing #finale .fA { animation: ltrSpring 0.7s cubic-bezier(.18,1.35,.3,1) 9.03s both; }
  .playing #finale .fM { animation: ltrSpring 0.7s cubic-bezier(.18,1.35,.3,1) 9.17s both; }
  .playing #finale .tag1 { animation: wordUp 0.7s cubic-bezier(.2,.9,.25,1.1) 9.85s both; }
  .playing #finale .tag2 { animation: wordUp 0.7s cubic-bezier(.2,.9,.25,1.1) 10.15s both; }
  @keyframes ltrSpring { from { opacity: 0; transform: translateY(140px) rotate(8deg) scale(0.7); } to { opacity: 1; transform: none; } }

  /* ---------- controls (hidden while idle / recording) ---------- */
  #bar { position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%); z-index: 10; display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 999px; background: rgba(16,18,24,0.85); border: 1px solid rgba(255,255,255,0.18); color: #fff; font-size: 14px; transition: opacity .4s; }
  body.idle #bar { opacity: 0; pointer-events: none; }
  #bar button, #bar select { font: inherit; border-radius: 999px; border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.1); color: #fff; padding: 7px 16px; cursor: pointer; }
  #bar button:hover { background: rgba(255,255,255,0.2); }
  #bar .hint { color: rgba(255,255,255,0.55); font-size: 12.5px; }
</style>
</head>
<body>
<div id="frame">
  <div id="stage" class="bg-white">
    <div class="scene sT"><span class="inner"><span class="clip"><span class="ltr cT">T</span></span><span class="rule"></span><span class="lname"><span>Theatre</span> <span class="cT">&amp;</span> <span>the</span> <span>Arts</span></span></span></div>
    <div class="scene sE"><span class="inner"><span class="clip"><span class="ltr cE">E</span></span><span class="rule"></span><span class="lname"><span>Enterprise</span> <span class="cE">&amp;</span> <span>Engineering</span></span></span></div>
    <div class="scene sA"><span class="inner"><span class="clip"><span class="ltr cA">A</span></span><span class="rule"></span><span class="lname"><span>Advocacy</span> <span class="cA">&amp;</span> <span>Service</span></span></span></div>
    <div class="scene sM"><span class="inner"><span class="clip"><span class="ltr cM">M</span></span><span class="rule"></span><span class="lname"><span>Mobilizing</span> <span class="cM">&amp;</span> <span>Leadership</span></span></span></div>
    <div id="finale">
      <div class="inner">
        <div class="word"><span class="fT cT">T</span><span class="fE cE">E</span><span class="fA cA">A</span><span class="fM cM">M</span></div>
        <div class="tag1">TEAM comes first.</div>
        <div class="tag2">Only together can we solve problems to better the world.</div>
      </div>
    </div>
  </div>
</div>

<div id="bar">
  <button id="play">▶ Play</button>
  <select id="bg">
    <option value="bg-white">White background</option>
    <option value="bg-black">Black</option>
    <option value="bg-green">Green screen (key out)</option>
    <option value="bg-dawn">Dawn gradient</option>
  </select>
  <span class="hint">R = replay · controls hide when idle · record the screen at fullscreen</span>
</div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="#ffffff"/><text x="50" y="64" font-family="Helvetica" font-size="34" font-weight="800" text-anchor="middle"><tspan fill="#8b5cf6">T</tspan><tspan fill="#2563eb">E</tspan><tspan fill="#16a34a">A</tspan><tspan fill="#f59e0b">M</tspan></text></svg>
</template>

<script>
(function () {
  var stage = document.getElementById('stage');

  /* scale 1920x1080 to fit viewport, centered via the same transform */
  function fit() {
    var s = Math.min(innerWidth / 1920, innerHeight / 1080);
    stage.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
  }
  addEventListener('resize', fit); fit();

  /* play / replay */
  function play() {
    stage.classList.remove('playing');
    void stage.offsetWidth;
    stage.classList.add('playing');
  }
  document.getElementById('play').addEventListener('click', play);
  addEventListener('keydown', function (e) { if (e.key === 'r' || e.key === 'R') play(); });

  /* background picker */
  document.getElementById('bg').addEventListener('change', function () {
    stage.className = this.value + (stage.classList.contains('playing') ? ' playing' : '');
  });

  /* hide controls when idle so recordings stay clean */
  var idleT;
  function wake() {
    document.body.classList.remove('idle');
    clearTimeout(idleT);
    idleT = setTimeout(function () { document.body.classList.add('idle'); }, 1800);
  }
  addEventListener('mousemove', wake); wake();

  setTimeout(play, 500);
})();
</script>
</body>
</html>
